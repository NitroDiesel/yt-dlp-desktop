name: Release candidate

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: read

jobs:
  package:
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: release-${{ matrix.target }}
      - run: pnpm install --frozen-lockfile
      - name: Prepare Windows sidecars
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/prepare-sidecars.ps1 -Target '${{ matrix.target }}'
      - name: Prepare Unix sidecars
        if: runner.os != 'Windows'
        run: ./scripts/prepare-sidecars.sh '${{ matrix.target }}'
      - run: pnpm tauri build --target '${{ matrix.target }}' --bundles '${{ matrix.bundles }}'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Generate Windows checksums
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem -Path "src-tauri/target/${{ matrix.target }}/release/bundle" -Recurse -File -Include *.exe,*.msi | ForEach-Object { "{0}  {1}" -f (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant(), $_.Name } | Set-Content -Encoding ascii "SHA256SUMS-${{ matrix.target }}.txt"
      - name: Generate Unix checksums
        if: runner.os != 'Windows'
        shell: bash
        run: find "src-tauri/target/${{ matrix.target }}/release/bundle" -type f \( -name '*.dmg' -o -name '*.deb' -o -name '*.AppImage' \) -exec shasum -a 256 {} \; > "SHA256SUMS-${{ matrix.target }}.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            SHA256SUMS-${{ matrix.target }}.txt
          if-no-files-found: error

  draft-release:
    needs: package
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/SHA256SUMS-*.txt
