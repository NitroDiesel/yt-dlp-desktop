name: Package smoke

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: package-${{ matrix.target }}
      - run: pnpm install --frozen-lockfile
      - name: Prepare Windows sidecars
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/prepare-sidecars.ps1 -Target '${{ matrix.target }}'
      - name: Prepare Unix sidecars
        if: runner.os != 'Windows'
        run: ./scripts/prepare-sidecars.sh '${{ matrix.target }}'
      - run: pnpm tauri build --target '${{ matrix.target }}' --bundles '${{ matrix.bundles }}'
      - uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-desktop-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: error
